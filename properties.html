<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Properties | JC Handyman</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/properties.css">
</head>
<body data-page="properties">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-block">
        <img class="brand-logo" src="jc-handyman-logo.png" alt="JC Handyman & Property Management"
             onerror="this.style.display='none';document.querySelector('.brand-fallback').style.display='block'">
        <div class="brand-fallback">JC</div>
      </div>
      <nav class="nav">
        <a href="dashboard.html"><span>🏠</span>Dashboard</a>
        <a href="customers.html"><span>👥</span>Customers</a>
        <a class="active" href="properties.html"><span>🏡</span>Properties</a>
        <a href="jobs.html"><span>🔨</span>Jobs</a>
        <a href="estimates.html"><span>📄</span>Estimates</a>
        <a href="invoices.html"><span>🧾</span>Invoices</a>
        <a href="calendar.html"><span>📅</span>Calendar</a>
        <a href="settings.html"><span>⚙️</span>Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <p class="eyebrow">PROPERTY CENTER</p>
          <h1>Properties</h1>
          <p>Every property connected to your customers appears here automatically.</p>
        </div>
        <div class="header-actions">
          <a class="secondary-btn" href="customers.html">Customers</a>
          <a class="primary-btn" href="customers.html">+ Add Property</a>
        </div>
      </header>

      <section class="stats-grid">
        <article><span>Total properties</span><strong id="totalProperties">0</strong></article>
        <article><span>Active</span><strong id="activeProperties">0</strong></article>
        <article><span>Customers</span><strong id="customerCount">0</strong></article>
      </section>

      <section class="filters">
        <input id="propertySearch" type="search" placeholder="Search owner, address, type, or notes">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </section>

      <section id="propertiesList" class="properties-grid"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/properties.js"></script>
  <script src="js/cloud-integration.js"></script>
</body>
</html>
