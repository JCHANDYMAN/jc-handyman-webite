<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JC Field Check-In</title><style>
:root{--b:#050505;--c:#1b1b1b;--o:#e86b00;--o2:#ff9b35;--g:#8cff9b;--r:#ff8b8b}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--b);color:#fff}
header{background:#000;border-bottom:3px solid var(--o);padding:16px;text-align:center;position:sticky;top:0;z-index:50}
h1{margin:0}h2,h3{color:var(--o2)}
nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
nav a,.btn,button{display:inline-block;text-decoration:none;background:#151515;color:#fff;border:1px solid var(--o);border-radius:9px;padding:11px 13px;font-weight:900;margin:4px;cursor:pointer}
.primary{background:var(--o)!important;color:#000!important}
section{max-width:1200px;margin:auto;padding:20px 12px}
.card{background:var(--c);border:1px solid var(--o);border-radius:14px;padding:16px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
input,select,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #777;background:#fff;color:#000;font-size:16px}
.small{font-size:13px;color:#ccc}.success{color:var(--g);font-weight:bold}.error{color:var(--r);font-weight:bold}
table{width:100%;border-collapse:collapse;background:#111;margin-top:10px}
td,th{border:1px solid var(--o);padding:8px;text-align:left;font-size:14px;vertical-align:top}
th{color:var(--o2)}
.print-box{background:#fff;color:#000;padding:24px;border-radius:10px;margin:15px 0}.print-box h2,.print-box h3{color:#000}
.sig{background:#fff;border:2px solid var(--o);border-radius:8px;width:100%;height:190px;touch-action:none}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:100px;background:#111;border:1px solid var(--o);border-radius:8px;padding:7px}.event{font-size:12px;background:#252525;margin-top:5px;padding:5px;border-radius:5px}
@media(max-width:750px){.calendar{grid-template-columns:repeat(2,1fr)}header{position:relative}}
@media print{header,nav,button,.no-print{display:none!important}body{background:#fff;color:#000}.card{border:0}.print-box{display:block}}
</style></head><body>
<header><h1>JC Handyman GPS Check-In</h1><nav><a href="app.html">CRM</a><a href="calendar.html">Calendar</a><a href="mobile-field.html">Mobile Field</a></nav></header>
<section><div class="card"><h2>Check In / Out</h2><input id="customer_id" type="number" placeholder="Customer ID"><input id="job_id" type="number" placeholder="Job ID"><select id="checkin_type"><option>Checked In</option><option>Checked Out</option><option>Started Work</option><option>Paused Work</option><option>Completed</option></select><input id="location_note" placeholder="Location note"><input id="lat" placeholder="Latitude"><input id="lng" placeholder="Longitude"><button onclick="getLocation()">Use My Location</button><textarea id="notes" placeholder="Notes"></textarea><button class="primary" onclick="saveCheckin()">Save Check-In</button><p id="msg" class="small">Ready.</p></div><div class="card"><h2>Recent Check-Ins</h2><div id="list"></div></div></section>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
import { SUPABASE_URL, SUPABASE_KEY } from './config.js'
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)
window.getLocation=()=>{if(!navigator.geolocation){msg.textContent='GPS not available.';return}navigator.geolocation.getCurrentPosition(p=>{lat.value=p.coords.latitude;lng.value=p.coords.longitude;msg.textContent='Location added.'},e=>{msg.textContent=e.message})}
window.saveCheckin=async()=>{msg.textContent='Saving...';const row={customer_id:Number(customer_id.value)||null,job_id:Number(job_id.value)||null,checkin_type:checkin_type.value,location_note:location_note.value,latitude:Number(lat.value)||null,longitude:Number(lng.value)||null,notes:notes.value};const {error}=await supabase.from('field_checkins').insert([row]);if(error){msg.textContent=error.message;msg.className='small error';return}msg.textContent='Check-in saved.';msg.className='small success';loadData()}
async function loadData(){const {data,error}=await supabase.from('field_checkins').select('*').order('id',{ascending:false}).limit(20);list.innerHTML=error?'<p class="error">'+error.message+'</p>':'<table><tr><th>ID</th><th>Customer</th><th>Job</th><th>Type</th><th>Location</th><th>Time</th></tr>'+data.map(r=>`<tr><td>${r.id}</td><td>${r.customer_id||''}</td><td>${r.job_id||''}</td><td>${r.checkin_type||''}</td><td>${r.latitude||''}, ${r.longitude||''}</td><td>${r.created_at||''}</td></tr>`).join('')+'</table>'}
loadData()
</script></body></html>
