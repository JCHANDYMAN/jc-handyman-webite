<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JC Invoice Generator</title><style>
:root{--b:#050505;--c:#1b1b1b;--o:#e86b00;--o2:#ff9b35;--g:#8cff9b;--r:#ff8b8b}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--b);color:#fff}
header{background:#000;border-bottom:3px solid var(--o);padding:16px;text-align:center;position:sticky;top:0;z-index:50}
h1{margin:0}h2,h3{color:var(--o2)}
nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
nav a,.btn,button{display:inline-block;text-decoration:none;background:#151515;color:#fff;border:1px solid var(--o);border-radius:9px;padding:11px 13px;font-weight:900;margin:4px;cursor:pointer}
.primary{background:var(--o)!important;color:#000!important}
section{max-width:1200px;margin:auto;padding:20px 12px}
.card{background:var(--c);border:1px solid var(--o);border-radius:14px;padding:16px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
input,select,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #777;background:#fff;color:#000;font-size:16px}
.small{font-size:13px;color:#ccc}.success{color:var(--g);font-weight:bold}.error{color:var(--r);font-weight:bold}
table{width:100%;border-collapse:collapse;background:#111;margin-top:10px}
td,th{border:1px solid var(--o);padding:8px;text-align:left;font-size:14px;vertical-align:top}
th{color:var(--o2)}
.print-box{background:#fff;color:#000;padding:24px;border-radius:10px;margin:15px 0}.print-box h2,.print-box h3{color:#000}
.sig{background:#fff;border:2px solid var(--o);border-radius:8px;width:100%;height:190px;touch-action:none}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:100px;background:#111;border:1px solid var(--o);border-radius:8px;padding:7px}.event{font-size:12px;background:#252525;margin-top:5px;padding:5px;border-radius:5px}
@media(max-width:750px){.calendar{grid-template-columns:repeat(2,1fr)}header{position:relative}}
@media print{header,nav,button,.no-print{display:none!important}body{background:#fff;color:#000}.card{border:0}.print-box{display:block}}
</style></head><body>
<header><h1>Invoice Generator</h1><nav><a href="app.html">CRM</a><a href="estimate-generator.html">Estimate Generator</a></nav></header>
<section><div class="card"><h2>Create Invoice</h2><input id="customer_id" type="number" placeholder="Customer ID"><input id="title" placeholder="Invoice Title"><textarea id="work" placeholder="Work completed"></textarea><input id="labor" type="number" placeholder="Labor $"><input id="materials" type="number" placeholder="Materials $"><input id="paid" type="number" placeholder="Paid $"><textarea id="notes" placeholder="Notes"></textarea><button class="primary" onclick="saveInvoice()">Save Invoice</button><button onclick="makePrintable()">Create Printable Invoice</button><button onclick="window.print()">Print / Save PDF</button><p id="msg" class="small">Ready.</p></div><div id="printBox" class="print-box"></div></section>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
import { SUPABASE_URL, SUPABASE_KEY } from './config.js'
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY); let customers=[];
function money(v){return '$'+Number(v||0).toFixed(2)} function cust(id){return customers.find(c=>Number(c.id)===Number(id))||{}}
window.saveInvoice=async()=>{let total=(Number(labor.value)||0)+(Number(materials.value)||0),p=Number(paid.value)||0;let row={customer_id:Number(customer_id.value)||null,title:title.value,work_completed:work.value,labor:Number(labor.value)||0,materials:Number(materials.value)||0,total,paid:p,balance:total-p,status:total-p<=0?'Paid':'Open',notes:notes.value};let {error}=await supabase.from('invoices').insert([row]);msg.textContent=error?error.message:'Invoice saved.';msg.className=error?'small error':'small success'}
window.makePrintable=()=>{let c=cust(customer_id.value),total=(Number(labor.value)||0)+(Number(materials.value)||0),p=Number(paid.value)||0,b=total-p;printBox.innerHTML=`<h2>JC Handyman & Property Maintenance</h2><h3>Invoice</h3><p><b>Customer:</b> ${c.name||'Customer ID '+customer_id.value}<br>${c.phone||''}<br>${c.email||''}<br>${c.address||''}</p><p><b>${title.value}</b></p><p>${work.value.replace(/\n/g,'<br>')}</p><table><tr><th>Labor</th><th>Materials</th><th>Total</th><th>Paid</th><th>Balance</th></tr><tr><td>${money(labor.value)}</td><td>${money(materials.value)}</td><td>${money(total)}</td><td>${money(p)}</td><td>${money(b)}</td></tr></table><p>Payment Methods: Cash, Cash App, PayPal, Check</p>`}
async function load(){let r=await supabase.from('customers').select('*');customers=r.data||[]} load()
</script></body></html>
