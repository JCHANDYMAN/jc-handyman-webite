<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JC Calendar V18</title><style>
:root{--b:#050505;--c:#1b1b1b;--o:#e86b00;--o2:#ff9b35;--g:#8cff9b;--r:#ff8b8b}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--b);color:#fff}
header{background:#000;border-bottom:3px solid var(--o);padding:16px;text-align:center;position:sticky;top:0;z-index:50}
h1{margin:0}h2,h3{color:var(--o2)}
nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
nav a,.btn,button{display:inline-block;text-decoration:none;background:#151515;color:#fff;border:1px solid var(--o);border-radius:9px;padding:11px 13px;font-weight:900;margin:4px;cursor:pointer}
.primary{background:var(--o)!important;color:#000!important}
section{max-width:1200px;margin:auto;padding:20px 12px}
.card{background:var(--c);border:1px solid var(--o);border-radius:14px;padding:16px;margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
input,select,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #777;background:#fff;color:#000;font-size:16px}
.small{font-size:13px;color:#ccc}.success{color:var(--g);font-weight:bold}.error{color:var(--r);font-weight:bold}
table{width:100%;border-collapse:collapse;background:#111;margin-top:10px}
td,th{border:1px solid var(--o);padding:8px;text-align:left;font-size:14px;vertical-align:top}
th{color:var(--o2)}
.print-box{background:#fff;color:#000;padding:24px;border-radius:10px;margin:15px 0}.print-box h2,.print-box h3{color:#000}
.sig{background:#fff;border:2px solid var(--o);border-radius:8px;width:100%;height:190px;touch-action:none}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:100px;background:#111;border:1px solid var(--o);border-radius:8px;padding:7px}.event{font-size:12px;background:#252525;margin-top:5px;padding:5px;border-radius:5px}
@media(max-width:750px){.calendar{grid-template-columns:repeat(2,1fr)}header{position:relative}}
@media print{header,nav,button,.no-print{display:none!important}body{background:#fff;color:#000}.card{border:0}.print-box{display:block}}
</style></head><body>
<header><h1>JC Handyman Calendar</h1><p>Daily / Monthly scheduling</p><nav><a href="app.html">CRM</a><a href="mobile-field.html">Mobile Field</a><a href="field-checkin.html">Check-In</a></nav></header>
<section><div class="card"><h2>Add Appointment</h2><input id="customer_id" type="number" placeholder="Customer ID"><input id="job_id" type="number" placeholder="Job ID"><input id="title" placeholder="Appointment Title"><select id="appointment_type"><option>Job</option><option>Estimate</option><option>Inspection</option><option>Follow-Up</option><option>Emergency Call</option></select><input id="appointment_date" type="date"><input id="appointment_time" type="time"><select id="status"><option>Scheduled</option><option>Confirmed</option><option>Completed</option><option>Cancelled</option></select><textarea id="notes" placeholder="Notes"></textarea><button class="primary" onclick="saveAppointment()">Save Appointment</button><p id="msg" class="small">Ready.</p></div>
<div class="card"><h2>Month View</h2><input id="month" type="month"><button onclick="loadData()">Refresh Calendar</button><div id="calendar" class="calendar"></div></div>
<div class="card"><h2>Appointment List</h2><div id="list"></div></div></section>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
import { SUPABASE_URL, SUPABASE_KEY } from './config.js'
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY); let items=[];
function table(rows){if(!rows.length)return '<p>No appointments yet.</p>';return '<table><tr><th>ID</th><th>Date</th><th>Time</th><th>Title</th><th>Customer</th><th>Status</th></tr>'+rows.map(r=>`<tr><td>${r.id}</td><td>${r.appointment_date||''}</td><td>${r.appointment_time||''}</td><td>${r.title||''}</td><td>${r.customer_id||''}</td><td>${r.status||''}</td></tr>`).join('')+'</table>'}
window.saveAppointment=async()=>{msg.textContent='Saving...';const row={customer_id:Number(customer_id.value)||null,job_id:Number(job_id.value)||null,title:title.value,appointment_type:appointment_type.value,appointment_date:appointment_date.value||null,appointment_time:appointment_time.value||null,status:status.value,notes:notes.value};const {error}=await supabase.from('appointments').insert([row]);if(error){msg.textContent=error.message;msg.className='small error';return}msg.textContent='Appointment saved.';msg.className='small success';loadData()}
window.loadData=async()=>{const {data,error}=await supabase.from('appointments').select('*').order('appointment_date',{ascending:true});items=error?[]:data;list.innerHTML=error?'<p class="error">'+error.message+'</p>':table(items);renderMonth()}
function renderMonth(){let m=month.value||new Date().toISOString().slice(0,7);let [y,mo]=m.split('-').map(Number);let days=new Date(y,mo,0).getDate();let html='';for(let d=1;d<=days;d++){let ds=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let ev=items.filter(a=>a.appointment_date===ds);html+=`<div class="day"><b>${d}</b>${ev.map(e=>`<div class="event">${e.appointment_time||''} ${e.title||''}<br>${e.status||''}</div>`).join('')}</div>`}calendar.innerHTML=html}
loadData()
</script></body></html>
