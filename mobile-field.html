<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JC Handyman Mobile Field Mode</title>
<style>
:root{--b:#050505;--c:#1b1b1b;--o:#e86b00;--o2:#ff9b35;--g:#8cff9b;--r:#ff8b8b}
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--b);color:#fff}
header{background:#000;border-bottom:3px solid var(--o);padding:14px;text-align:center;position:sticky;top:0;z-index:50}
h1{margin:0}h2,h3{color:var(--o2)}
section{max-width:900px;margin:auto;padding:18px 12px}
.card{background:var(--c);border:1px solid var(--o);border-radius:14px;padding:16px;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,textarea{width:100%;padding:13px;margin:7px 0;border-radius:8px;border:1px solid #777;background:#fff;color:#000;font-size:16px}
button,.btn{display:inline-block;text-align:center;text-decoration:none;background:var(--o);color:#000;border:0;border-radius:10px;padding:14px 16px;font-weight:900;cursor:pointer;margin:5px 3px;font-size:16px}
.secondary{background:#222;color:#fff;border:1px solid var(--o)}
.success{color:var(--g);font-weight:bold}.error{color:var(--r);font-weight:bold}.small{font-size:13px;color:#ccc}
table{width:100%;border-collapse:collapse;background:#111;margin-top:10px}
td,th{border:1px solid var(--o);padding:8px;text-align:left;font-size:14px;vertical-align:top}
th{color:var(--o2)}
.big{font-size:22px}
.fixed{position:fixed;right:12px;bottom:12px;background:var(--o);color:#000;border-radius:30px;padding:12px 15px;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
<header>
<h1>JC Handyman Mobile Field Mode</h1>
<p>Jobsite check-in • Directions • Completion log • Quick actions</p>
<a class="btn secondary" href="app.html">Back to CRM</a>
</header>

<section>
<div class="card">
<h2>Open Jobsite Mode</h2>
<input id="customerId" type="number" placeholder="Customer ID">
<input id="jobId" type="number" placeholder="Job ID">
<button onclick="loadJobsite()">Load Customer / Job</button>
<p id="status" class="small">Ready.</p>
</div>

<div id="jobsiteBox"></div>

<div class="grid">
<div class="card">
<h3>Check In / Out</h3>
<select id="checkinType">
<option>Checked In</option>
<option>Checked Out</option>
<option>Started Work</option>
<option>Paused Work</option>
<option>Returned for Follow-Up</option>
</select>
<input id="locationNote" placeholder="Location note, example: Arrived on site">
<textarea id="checkinNotes" placeholder="Notes"></textarea>
<button onclick="saveCheckin()">Save Check-In</button>
</div>

<div class="card">
<h3>Complete Job</h3>
<select id="completionStatus">
<option>Completed</option>
<option>Partially Completed</option>
<option>Needs Follow-Up</option>
<option>Waiting on Materials</option>
<option>Customer Not Home</option>
</select>
<textarea id="workCompleted" placeholder="Work completed"></textarea>
<input id="followupNeeded" placeholder="Follow-up needed">
<input id="amountDue" type="number" placeholder="Amount Due $">
<input id="amountPaid" type="number" placeholder="Amount Paid $">
<textarea id="completionNotes" placeholder="Completion notes"></textarea>
<button onclick="saveCompletion()">Save Completion Log</button>
</div>
</div>

<div class="card">
<h3>Quick Actions</h3>
<div id="quickActions"></div>
</div>

<div class="card">
<h3>Recent Field Logs</h3>
<div id="fieldLogs"></div>
</div>

<div class="card">
<h3>Recent Completion Logs</h3>
<div id="completionLogs"></div>
</div>
</section>

<a class="fixed" href="app.html">CRM</a>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
import { SUPABASE_URL, SUPABASE_KEY } from './config.js'

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY)
let all={customers:[],jobs:[],checkins:[],completions:[]}
const statusBox=document.getElementById('status')

function money(v){return '$'+Number(v||0).toFixed(2)}
function setStatus(m,c='small'){statusBox.textContent=m;statusBox.className=c}
function customer(id){return all.customers.find(x=>Number(x.id)===Number(id))||{}}
function job(id){return all.jobs.find(x=>Number(x.id)===Number(id))||{}}
function mapsLink(addr){return addr?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`:'#'}
function table(items,cols){
 if(!items||!items.length)return '<p class="small">No records yet.</p>'
 return '<table><tr>'+cols.map(c=>'<th>'+c.label+'</th>').join('')+'</tr>'+
 items.map(i=>'<tr>'+cols.map(c=>'<td>'+(c.format?c.format(i[c.key],i):(i[c.key]??''))+'</td>').join('')+'</tr>').join('')+
 '</table>'
}
async function ins(t,r){const {error}=await supabase.from(t).insert([r]);if(error)throw error}

const checkCols=[
 {key:'id',label:'ID'},
 {key:'customer_id',label:'Customer'},
 {key:'job_id',label:'Job'},
 {key:'checkin_type',label:'Type'},
 {key:'location_note',label:'Location Note'},
 {key:'created_at',label:'Time'}
]
const completionCols=[
 {key:'id',label:'ID'},
 {key:'customer_id',label:'Customer'},
 {key:'job_id',label:'Job'},
 {key:'completion_status',label:'Status'},
 {key:'amount_due',label:'Due',format:money},
 {key:'amount_paid',label:'Paid',format:money},
 {key:'created_at',label:'Time'}
]

window.loadJobsite=()=>{
 const c=customer(customerId.value)
 const j=job(jobId.value)
 if(!c.id && !j.id){
   jobsiteBox.innerHTML='<div class="card"><p class="error">Customer or job not found. Make sure IDs are correct.</p></div>'
   return
 }
 jobsiteBox.innerHTML=`<div class="card">
 <h2>${c.name||'Customer ID '+customerId.value}</h2>
 <p class="big">${c.phone?`<a class="btn" href="tel:${c.phone}">Call Customer</a>`:''}
 ${c.email?`<a class="btn secondary" href="mailto:${c.email}">Email</a>`:''}
 ${c.address?`<a class="btn" target="_blank" href="${mapsLink(c.address)}">Directions</a>`:''}</p>
 <p><b>Address:</b> ${c.address||''}</p>
 <h3>Job</h3>
 <p><b>${j.title||'Job ID '+jobId.value}</b><br>Status: ${j.status||''}<br>Price: ${money(j.price)}<br>Balance: ${money(j.balance)}</p>
 </div>`
 quickActions.innerHTML=`
 <a class="btn" href="${mapsLink(c.address)}" target="_blank">Open Directions</a>
 <a class="btn secondary" href="app.html#uploads">Upload Before/After Photo</a>
 <a class="btn secondary" href="app.html#signature">Get Customer Signature</a>
 <a class="btn secondary" href="app.html#invoice">Create Invoice</a>
 <a class="btn secondary" href="app.html#receipt">Create Receipt</a>
 <a class="btn secondary" href="app.html#paperwork">Print Paperwork</a>
 `
}

window.saveCheckin=async()=>{
 try{
   await ins('field_checkins',{
     customer_id:Number(customerId.value)||null,
     job_id:Number(jobId.value)||null,
     checkin_type:checkinType.value,
     location_note:locationNote.value,
     notes:checkinNotes.value
   })
   setStatus('Check-in saved.','small success')
   await loadData()
 }catch(e){setStatus(e.message,'small error')}
}

window.saveCompletion=async()=>{
 try{
   await ins('job_completion_logs',{
     customer_id:Number(customerId.value)||null,
     job_id:Number(jobId.value)||null,
     completion_status:completionStatus.value,
     work_completed:workCompleted.value,
     followup_needed:followupNeeded.value,
     amount_due:Number(amountDue.value)||0,
     amount_paid:Number(amountPaid.value)||0,
     notes:completionNotes.value
   })
   setStatus('Completion log saved.','small success')
   await loadData()
 }catch(e){setStatus(e.message,'small error')}
}

async function loadData(){
 setStatus('Loading...')
 for(const t of ['customers','jobs','field_checkins','job_completion_logs']){
   const r=await supabase.from(t).select('*').order('id',{ascending:false})
   const k=t==='field_checkins'?'checkins':t==='job_completion_logs'?'completions':t
   all[k]=r.error?[]:r.data
   if(r.error) console.warn(t,r.error)
 }
 fieldLogs.innerHTML=table(all.checkins,checkCols)
 completionLogs.innerHTML=table(all.completions,completionCols)
 setStatus('Connected.','small success')
}
loadData()
</script>
</body>
</html>
