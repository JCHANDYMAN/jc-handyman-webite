<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mobile Field Mode</title><style>
:root{--b:#050505;--c:#1b1b1b;--o:#e86b00;--o2:#ff9b35;--g:#8cff9b;--r:#ff8b8b}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--b);color:#fff}
header{position:sticky;top:0;background:#000;border-bottom:3px solid var(--o);padding:14px;text-align:center;z-index:50}
h1{margin:0}h2,h3{color:var(--o2)}nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
nav a,.btn,button{color:#fff;text-decoration:none;border:1px solid var(--o);border-radius:8px;padding:10px 12px;background:#151515;font-weight:bold;cursor:pointer}
button.primary,.btn.primary{background:var(--o);color:#000}
section{max-width:1380px;margin:auto;padding:28px 16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:15px}
.card{background:var(--c);border:1px solid var(--o);border-radius:14px;padding:16px;margin:10px 0}
.statcard{background:linear-gradient(135deg,#142850,#0a0a0a);border:1px solid var(--o);border-radius:14px;padding:16px}
input,select,textarea{width:100%;padding:11px;margin:6px 0;border-radius:7px;border:1px solid #777;background:#fff;color:#000}
.small{font-size:13px;color:#ccc}.success{color:var(--g);font-weight:bold}.error{color:var(--r);font-weight:bold}.stat{font-size:32px;color:var(--o2);font-weight:900}
table{width:100%;border-collapse:collapse;background:#111;margin-top:10px}td,th{border:1px solid var(--o);padding:8px;text-align:left;font-size:14px;vertical-align:top}th{color:var(--o2)}
.print-box{background:#fff;color:#000;padding:24px;border-radius:10px;margin:15px 0}.print-box h2,.print-box h3{color:#000}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#202020;border:1px solid var(--o);margin:2px}.good{border-color:var(--g)}
.sig{background:#fff;border:2px solid var(--o);border-radius:8px;width:100%;height:180px;touch-action:none}
@media print{header,nav,button,.no-print{display:none!important}body{background:#fff;color:#000}.card{border:0}}
</style></head><body><header><h1>JC Handyman Mobile Field Mode</h1><p>Jobsite quick mode</p><nav><a href="app.html">Back to CRM</a><a href="deployment-hub.html">Deployment Hub</a></nav></header><section><div class="card"><h2>Mobile Field Mode Is Working</h2><p>This page is loading as a root-level file from GitHub Pages.</p></div><div class="card"><h3>Jobsite Quick Form</h3><input placeholder="Customer ID"><input placeholder="Job ID"><select><option>Checked In</option><option>Checked Out</option><option>Completed</option></select><textarea placeholder="Job notes"></textarea><button class="primary">Save Field Note</button></div></section></body></html>
